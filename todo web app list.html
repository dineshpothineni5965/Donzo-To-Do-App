<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donzo – To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --accent: #c8f135;
      --accent2: #f1c835;
      --text: #f0f0f0;
      --muted: #666;
      --done: #3a3a3a;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px 80px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      margin-bottom: 36px;
      animation: slideDown 0.6s ease;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      animation: slideDown 0.7s ease;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      animation: slideDown 0.8s ease;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: var(--radius);
      padding: 16px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .add-btn {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: var(--radius);
      padding: 16px 24px;
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }

    .add-btn:hover { background: #d4f855; transform: scale(1.05); }
    .add-btn:active { transform: scale(0.97); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      animation: slideDown 0.9s ease;
    }

    .filter-btn {
      background: var(--surface);
      color: var(--muted);
      border: none;
      border-radius: 100px;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--accent);
      color: #0f0f0f;
      font-weight: 600;
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: popIn 0.3s ease;
      transition: background 0.2s, opacity 0.2s;
      border: 1px solid transparent;
    }

    .task-item:hover {
      border-color: var(--surface2);
      background: #1f1f1f;
    }

    .task-item.done {
      opacity: 0.5;
    }

    /* Checkbox */
    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 14px;
      color: transparent;
    }

    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
    }

    .check-btn:hover {
      border-color: var(--accent);
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      transition: all 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Priority badge */
    .priority {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .priority.high { background: #ff4d4d22; color: #ff6b6b; }
    .priority.medium { background: #f1c83522; color: var(--accent2); }
    .priority.low { background: #c8f13522; color: var(--accent); }

    /* Delete btn */
    .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .del-btn:hover { color: #ff6b6b; background: #ff4d4d11; }

    /* Priority selector */
    .priority-select {
      background: var(--surface2);
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
      animation: fadeIn 0.4s ease;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* Clear completed */
    .bottom-bar {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }

    .bottom-text { font-size: 13px; color: var(--muted); }

    .clear-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .clear-btn:hover { color: #ff6b6b; background: #ff4d4d11; }

    /* Animations */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .removing {
      animation: slideOut 0.25s ease forwards;
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(30px); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Don<span>zo</span></h1>
    <p>Check it off. Get it donzo.</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="activeCount">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-label">Done</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100"/>
    </div>
    <select class="priority-select" id="prioritySelect">
      <option value="medium">⚡ Med</option>
      <option value="high">🔴 High</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
  </div>

  <div class="task-list" id="taskList"></div>

  <div class="bottom-bar">
    <span class="bottom-text" id="bottomText"></span>
    <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('donzo') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('donzo', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const priority = document.getElementById('prioritySelect').value;
    const text = input.value.trim();
    if (!text) return;

    tasks.unshift({ id: Date.now(), text, done: false, priority });
    input.value = '';
    save();
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save(); render();
      }, 250);
    }
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('taskList');
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const active = total - done;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('activeCount').textContent = active;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('bottomText').textContent = `${active} task${active !== 1 ? 's' : ''} remaining`;

    const filtered = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">${filter === 'done' ? '🎯' : '✨'}</div>${filter === 'done' ? 'No completed tasks yet' : 'No tasks here!'}</div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}">
        <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
        <span class="task-text">${t.text}</span>
        <span class="priority ${t.priority}">${t.priority}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
